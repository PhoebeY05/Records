<!DOCTYPE html>

<html lang="en">
  <head>
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
      <link href="../static/styles.css" rel="stylesheet">
      <link rel="icon" type="image/png" href="{{ url_for('static', filename='icon.png') }}">
      <title>{% block title %}{% endblock %}</title>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
          document.querySelectorAll(".js-choose").forEach(function (btn) {
            btn.addEventListener("click", function () {
              localStorage.setItem("Clicked", "true")
            })
          })
          const buttonClicked = localStorage.getItem('Clicked')
          const navigationEntry = performance.getEntriesByType("navigation")[0]
          const randomModal = document.getElementById("random")
          if (navigationEntry && navigationEntry.type === "navigate" && buttonClicked == "true" && randomModal) {
            const myModal = new bootstrap.Modal(randomModal)
            myModal.show()
            localStorage.setItem("Clicked", "false")
          }
        })
    </script>
  </head>
  <nav class="navbar navbar-expand-lg navbar-dark bg main-nav sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand main-nav-brand georgia" href="/home">
          <img src="../static/icon.png" height="34" width="34" alt="">
          <span class="main-nav-brand-text">Reading Records</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav main-nav-links me-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link georgia {% if request.path == '/home' %}active{% endif %}" href="/home">Home</a></li>
            <li class="nav-item"><a class="nav-link georgia {% if request.path == '/tbr' %}active{% endif %}" href="/tbr">To Be Read</a></li>
            <li class="nav-item"><a class="nav-link georgia {% if request.path == '/completed' %}active{% endif %}" href="/completed">Completed</a></li>
            <li class="nav-item"><a class="nav-link georgia {% if request.path == '/unfinished' %}active{% endif %}" href="/unfinished">Unfinished</a></li>
            <li class="nav-item"><a class="nav-link georgia {% if request.path == '/add' %}active{% endif %}" href="/add">Add</a></li>
            <li class="nav-item"><a class="nav-link georgia {% if request.path == '/series' %}active{% endif %}" href="/series">Series</a></li>
            <li class="nav-item"><a class="nav-link georgia {% if request.path == '/import' %}active{% endif %}" href="/import">Import</a></li>
          </ul>
          <form class="main-nav-search d-flex mb-2 mb-lg-0 me-lg-2" action="/search" method="post" role="search">
            <input class="form-control georgia" type="search" placeholder="Search books..." name="search" aria-label="Search">
            <button class="btn btn-outline-light georgia ms-2" type="submit">Search</button>
          </form>
          <form action="/logout" method="get" class="m-0">
            <button class="btn btn-outline-light georgia" type="submit">Log Out</button>
          </form>
        </div>
      </div>
    </nav>
  <body class="platinum">
      {% block main %}{% endblock %}
  </body>
</html>
