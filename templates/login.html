{% extends "unknown_user.html" %}

{% block title %}
    Log In
{% endblock %}

{% block main %}
<form action="/" method="post" class="form-panel">
    <h2 class="mb-4 text-center">Welcome back</h2>
    <div class="form-floating mb-3">
        <input autocomplete="off" type="text" class="form-control" id="floatingInput" name="username" placeholder="Username">
        <label for="floatingInput">Username</label>
    </div>
    <div class="form-floating mb-3">
        <input type="password" class="form-control" id="floatingPassword" name="password" placeholder="Password">
        <label for="floatingPassword">Password</label>
    </div>
    <div class="form-actions">
        <button class="btn btn-primary" type="submit">Log In</button>
    </div>
</form>
{% endblock %}
