{% set ticked = "Completed" %}
{% set crossed = "Unfinished" %}
{% set title = "To Be Read" %}
{% set page = "/tbr" %}

{% extends "books.html" %}

{% block checked %}
<form action="/tbr" method="post" class="m-0">
    <input hidden name="change" value="tick"/>
    <input hidden name="book" value="{{book.id}}"/>
    <button type="submit" class="book-action-btn" aria-label="Mark completed">✅</button>
</form>
{% endblock %}

{% block crossed %}
<form action="/tbr" method="post" class="m-0">
    <input hidden name="change" value="cross"/>
    <input hidden name="book" value="{{book.id}}"/>
    <button type="submit" class="book-action-btn" aria-label="Mark unfinished">❎</button>
</form>
{% endblock %}
