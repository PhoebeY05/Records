{% set ticked = "Completed" %}
{% set crossed = "To Be Read" %}
{% set title = "Unfinished" %}
{% set page = "/unfinished" %}


{% extends "books.html" %}


{% block checked %}
<form action="/unfinished" method="post" class="m-0">
    <input hidden name="change" value="tick"/>
    <input hidden name="book" value="{{book.id}}"/>
    <button type="submit" class="book-action-btn" aria-label="Mark completed">✅</button>
</form>
{% endblock %}

{% block crossed %}
<form action="/unfinished" method="post" class="m-0">
    <input hidden name="change" value="cross"/>
    <input hidden name="book" value="{{book.id}}"/>
    <button type="submit" class="book-action-btn" aria-label="Move to TBR">❎</button>
</form>
{% endblock %}
